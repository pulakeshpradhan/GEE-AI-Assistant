<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEE AI Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="sidepanel.css">
</head>

<body>
    <div class="tab-container">
        <button class="tab-button active" data-tab="gee-assistant">AI Assistant</button>
        <button class="tab-button" data-tab="gemini-chat">Gemini</button>

        <div class="tab-button dropdown-tab-container" data-tab="ai-chat">
            <span>AI Chats ▼</span>
            <div class="dropdown-menu">
                <select id="ai-service-selector" class="input">
                    <option value="https://claude.ai/new">Anthropic Claude</option>
                    <option value="https://grok.com/">Grok</option>
                    <option value="https://chat.deepseek.com/">DeepSeek Chat</option>
                    <option value="https://chatgpt.com/">ChatGPT</option>
                    <option value="https://copilot.microsoft.com/">Microsoft Copilot</option>
                    <option value="https://chat.qwen.ai/">QWEN Chat</option>
                    <option value="https://www.kimi.com/">KIMI</option>
                </select>
            </div>
        </div>
    </div>

    <div id="gee-assistant" class="tab-content active">
        <header class="header">
            <div class="author-info">
                <div>Pulakesh Pradhan ❖ Ravenshaw University</div>
                <div><a href="https://pulakeshpradhan.github.io" target="_blank">https://pulakeshpradhan.github.io</a>
                </div>
                <!-- <div>Cuttack, Odisha, India</div> -->
            </div>
        </header>

        <main class="main-content">
            <div class="section">
                <div class="api-key-container">
                    <select id="modelSelector" class="input">
                        <option value="gemini-2.5-flash-lite">Gemini 2.5 Flash-Lite</option>
                        <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
                        <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
                        <option value="gemini-3.1-flash-lite-preview" selected>Gemini 3.1 Flash-Lite Preview</option>
                        <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro Preview</option>
                    </select>
                    <input type="password" id="apiKeyInput" class="input" placeholder="Enter Gemini API Key...">
                </div>
                <p class="help-text" id="apiKeyHelpText">
                    Get key from <a href="https://aistudio.google.com/app/apikey" target="_blank">Google AI Studio</a>.
                </p>
                <div class="analysis-container" style="margin-top: 10px;">
                    <div class="searchable-dropdown">
                        <input type="text" id="analysisSearchInput" class="input"
                            placeholder="Search Ready-to-Use Analysis Code...">
                        <div id="analysisOptionsContainer" class="dropdown-content"></div>
                        <input type="hidden" id="selectedAnalysisIndex">
                    </div>
                    <button id="showAnalysisBtn" class="btn">Show</button>
                </div>
            </div>

            <div class="action-buttons">
                <button id="runBtn" class="btn">Run</button>
                <button id="fixBtn" class="btn">Fix</button>
                <button id="downloadPyBtn" class="btn btn-download">Python</button>
                <button id="downloadRBtn" class="btn btn-r">R</button>
            </div>

            <div class="section"
                style="margin-top: 10px; display: flex; align-items: center; justify-content: space-between; background-color: #f8f9fa; padding: 8px 12px; border-radius: 8px; border: 1px solid #e0e0e0;">
                <label for="autoAgentToggle" class="label"
                    style="margin-bottom: 0; cursor: pointer; flex-grow: 1; display: flex; align-items: baseline; gap: 6px;">
                    <strong>Auto-Agent Mode</strong>
                    <span style="font-size: 11px; color: #666; font-weight: normal;">(Continuously fixes errors)</span>
                </label>
                <div class="toggle-switch">
                    <input type="checkbox" id="autoAgentToggle" class="checkbox-toggle">
                    <label for="autoAgentToggle" class="toggle-label"></label>
                </div>
            </div>



            <div class="section">
                <div style="display: flex; gap: 8px; margin-bottom: 8px; align-items: center;">
                    <div class="mode-toggle-container">
                        <button id="modeAutoBtn" class="mode-btn active">Auto</button>
                        <button id="modeModifyBtn" class="mode-btn">Modify</button>
                        <button id="modeGenerateBtn" class="mode-btn">Generate New</button>
                    </div>
                    <button id="unifiedMic" class="mic-button" data-target="unifiedPrompt" style="flex-shrink: 0;"
                        title="Record prompt with Gemini">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                            class="bi bi-mic-fill" viewBox="0 0 16 16">
                            <path d="M5 3a3 3 0 0 1 6 0v5a3 3 0 0 1-6 0V3z" />
                            <path
                                d="M3.5 6.5A.5.5 0 0 1 4 7v1a4 4 0 0 0 8 0V7a.5.5 0 0 1 1 0v1a5 5 0 0 1-4.5 4.975V15h3a.5.5 0 0 1 0 1h-7a.5.5 0 0 1 0-1h3v-2.025A5 5 0 0 1 3 8V7a.5.5 0 0 1 .5-.5z" />
                        </svg>
                    </button>
                </div>

                <div class="searchable-dropdown" style="margin-bottom: 8px;">
                    <input type="text" id="datasetSearchInput" class="input" placeholder="Search 5200+ GEE Datasets...">
                    <div id="datasetOptionsContainer" class="dropdown-content"></div>
                </div>

                <div id="promptInputArea" style="margin-bottom: 8px;">
                    <div id="chatInputWrapper" class="textarea"
                        style="padding: 6px; display: flex; flex-direction: column; cursor: text;">
                        <div id="datasetChipsContainer"
                            style="display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 4px; min-height: 0px;">
                        </div>
                        <textarea id="unifiedPrompt" rows="4"
                            style="border: none; outline: none; resize: vertical; width: 100%; background: transparent; font-family: inherit; font-size: inherit; margin: 0; padding: 0;"
                            placeholder="Describe what you want to generate (select operation above)..."></textarea>
                    </div>
                    <button id="executePromptBtn" class="btn btn-full" style="margin-top: 8px;">Generate Code</button>
                </div>

                <div id="autoModeArea"
                    style="display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px 0;">
                    <button class="big-mic-container" id="bigMicBtn" title="Click to start talking">
                        <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" fill="currentColor"
                            class="bi bi-mic-fill" viewBox="0 0 16 16">
                            <path d="M5 3a3 3 0 0 1 6 0v5a3 3 0 0 1-6 0V3z" />
                            <path
                                d="M3.5 6.5A.5.5 0 0 1 4 7v1a4 4 0 0 0 8 0V7a.5.5 0 0 1 1 0v1a5 5 0 0 1-4.5 4.975V15h3a.5.5 0 0 1 0 1h-7a.5.5 0 0 1 0-1h3v-2.025A5 5 0 0 1 3 8V7a.5.5 0 0 1 .5-.5z" />
                        </svg>
                    </button>
                    <div id="autoModeStatus"
                        style="margin-top: 15px; font-weight: 500; font-size: 14px; color: #555; text-align: center;">
                        Click to start speaking</div>
                </div>
            </div>

            <div id="status" class="status-bar" aria-live="polite"></div>
        </main>
    </div>

    <div id="ai-chat-content" class="tab-content">
        <iframe id="ai-chat-iframe" allow="clipboard-read; clipboard-write"></iframe>
    </div>



    <script src="sidepanel.js"></script>
</body>

</html>
